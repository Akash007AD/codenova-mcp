services:
  - type: web
    name: codenova-mcp
    runtime: python
    region: singapore
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.0"
      - key: ENVIRONMENT
        value: production

      # ── Set these in Render Dashboard → Environment ──────────────
      # (never commit real values to git)
      #
      # GITHUB_USERNAME   your GitHub login, e.g. Akash007AD
      # GITHUB_TOKEN      ghp_...  (read:user + public_repo scopes)
      # MCP_SECRET        generate: python -c "import secrets; print(secrets.token_hex(24))"
      # GROQ_API_KEY      gsk_...  (optional, enables AI explanations)
      # MONGODB_URI       mongodb+srv://...  (optional, profile caching)
      # REDIS_URL         redis://...        (optional, caching)
      # REDIS_PASSWORD    (if Redis needs auth)
